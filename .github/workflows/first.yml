name: Not really First
on: push
jobs:
  format_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: display start message
        run: echo "Formatting and Lintining in the process!!"

      - name: installing uv
        run: pip install uv

      - name: sync uv
        run: uv sync
      
      - name: Run checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
      